version: "3.9"

services:
  sentiment-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiment-dashboard
    restart: unless-stopped

    # Load semua env vars dari file .env
    env_file:
      - .env

    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

    volumes:
      # Mount data & models dari host agar tidak perlu rebuild saat update CSV/pkl
      - ./data:/app/data:ro
      - ./models:/app/models:ro

    environment:
      - TZ=${TZ:-Asia/Jakarta}
      - APP_ENV=${APP_ENV:-production}

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
