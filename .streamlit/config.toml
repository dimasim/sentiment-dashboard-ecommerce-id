[theme]
primaryColor        = "#EE4D2D"   # Shopee orange sebagai aksen utama
backgroundColor     = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor           = "#1A1A2E"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 50

[browser]
gatherUsageStats    = false

[runner]
magicEnabled        = false
